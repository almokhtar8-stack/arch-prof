<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ARCG 521 — Architectural Professional Practice Study Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />

    body {
      font-family: 'Crimson Pro', 'Georgia', serif;
      background: #FFF7F9;
      color: #3D2B2B;
      min-height: 100vh;
      min-height: 100dvh;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #E8B4C0; border-radius: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* ── Buttons reset ── */
    button { font-family: inherit; cursor: pointer; border: none; background: none; padding: 0; }

    /* ── Header ── */
    #app-header {
      background: linear-gradient(135deg, #F9E0E8 0%, #F2C4D3 50%, #E8A8BE 100%);
      padding: 20px 16px 18px;
      border-bottom: 1px solid #E8B4C0;
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; gap: 12;
    }
    #hamburger {
      display: none;
      background: rgba(255,255,255,0.65);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 20px;
      line-height: 1;
      flex-shrink: 0;
      border: 1px solid rgba(200,130,160,0.2);
    }
    .header-text { flex: 1; min-width: 0; }
    .header-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: #8C4A60; margin-bottom: 3px;
    }
    .header-title {
      font-size: clamp(16px, 3.5vw, 24px);
      font-weight: 700; color: #4A1A2E; line-height: 1.2;
    }
    .header-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; color: #8C4A60; margin-top: 3px;
    }
    .progress-box { text-align: right; font-family: 'DM Sans', sans-serif; flex-shrink: 0; }
    .progress-label { font-size: 10px; color: #8C4A60; font-weight: 600; margin-bottom: 4px; }
    .progress-bar {
      width: 100px; height: 7px;
      background: #F5D0DB; border-radius: 4px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #D4849B, #B05C78);
      border-radius: 4px; transition: width 0.5s ease;
    }
    .progress-pct { font-size: 10px; color: #8C4A60; margin-top: 2px; }

    /* ── Layout ── */
    #layout {
      max-width: 1200px; margin: 0 auto;
      display: flex; position: relative;
    }

    /* ── Sidebar ── */
    #sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(60,30,40,0.35);
      z-index: 998;
    }
    #sidebar {
      width: 260px; min-width: 260px;
      padding: 20px 14px;
      border-right: 1px solid #F0D0DA;
      background: #FFFAFB;
      position: sticky; top: 72px;
      height: calc(100vh - 72px);
      height: calc(100dvh - 72px);
      overflow-y: auto;
      transition: transform 0.3s ease;
      z-index: 999;
      flex-shrink: 0;
    }
    .sidebar-section-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: #B0758A; margin-bottom: 14px; padding-left: 8px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10;
      width: 100%; padding: 10px 12px;
      border-radius: 10px; margin-bottom: 3px;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 400;
      color: #6B4A55;
      transition: all 0.2s ease;
      line-height: 1.3;
    }
    .nav-item:hover { background: #FDF0F4; }
    .nav-item.active {
      background: linear-gradient(135deg, #F9E0E8, #F0C8D8);
      color: #6A2040; font-weight: 600;
    }
    .nav-icon { font-size: 18px; flex-shrink: 0; }
    .nav-divider { height: 1px; background: #F0D0DA; margin: 14px 0; }

    /* ── Main ── */
    #main-content {
      flex: 1; min-width: 0;
      padding: 24px clamp(14px, 3vw, 32px);
    }

    /* ── Cards ── */
    .card {
      background: white;
      border-radius: 16px;
      border: 1px solid #F5DDE3;
      box-shadow: 0 2px 12px rgba(200,130,160,0.08);
      transition: box-shadow 0.3s ease;
    }
    .card:hover { box-shadow: 0 4px 20px rgba(200,130,160,0.14); }

    /* ── Tag ── */
    .tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* ── Expand button ── */
    .expand-btn {
      width: 100%; text-align: left;
      padding: 14px 18px;
      display: flex; align-items: center;
      justify-content: space-between; gap: 10px;
      font-family: inherit;
      border-radius: 16px;
    }
    .expand-btn-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .sec-num {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 700;
      flex-shrink: 0;
      transition: all 0.25s;
    }
    .sec-num.closed { background: #F5DDE3; color: #8C4A60; }
    .sec-num.open { background: linear-gradient(135deg, #D4849B, #B05C78); color: white; }
    .sec-title { font-size: 15px; font-weight: 600; color: #4A1A2E; line-height: 1.3; }
    .expand-arrow {
      font-size: 16px; color: #C06080;
      transition: transform 0.25s;
      flex-shrink: 0;
    }

    /* ── Section body ── */
    .section-body { padding: 0 18px 18px; animation: fadeIn 0.3s ease-out; }
    .simple-block {
      background: #FFF5F8; border-radius: 12px;
      padding: 14px; margin-bottom: 14px;
      border-left: 4px solid #E8A8BE;
    }
    .academic-block {
      background: #FBF0F4; border-radius: 12px;
      padding: 14px; margin-bottom: 14px;
      border-left: 4px solid #D4849B;
    }
    .block-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; line-height: 1.7; color: #5A3545;
    }
    .academic-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; line-height: 1.75; color: #4A2535;
    }
    .terms-grid { display: grid; gap: 7px; margin-bottom: 14px; }
    .term-card {
      background: white;
      border: 1px solid #F0D0DA;
      border-radius: 10px;
      padding: 9px 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; line-height: 1.5; color: #5A3545;
    }
    .term-name { font-weight: 700; color: #7A3050; }
    .exam-block {
      background: #FFF8E8; border-radius: 12px;
      padding: 14px; margin-bottom: 14px;
      border: 1px solid #F0E0C0;
    }
    .exam-point {
      display: flex; gap: 8px; margin-bottom: 5px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; line-height: 1.55; color: #5A4020;
    }
    .exam-bullet { color: #C09030; font-weight: 700; flex-shrink: 0; margin-top: 0; }
    .confusion-block {
      background: #FFF0F0; border-radius: 12px;
      padding: 12px 14px; margin-bottom: 6px;
      border: 1px solid #F0C8C8;
    }
    .confusion-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; line-height: 1.55; color: #6A3030;
    }

    /* ── Quiz ── */
    .quiz-toggle-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 22px; border-radius: 12px;
      background: linear-gradient(135deg, #D4849B, #B05C78);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 600;
      box-shadow: 0 4px 16px rgba(180,80,120,0.25);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .quiz-toggle-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(180,80,120,0.3); }
    .quiz-item { padding: 16px; margin-bottom: 12px; }
    .quiz-q { font-size: 14px; font-weight: 600; color: #4A1A2E; margin-bottom: 10px; line-height: 1.5; }
    .reveal-btn {
      padding: 7px 15px; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
      transition: all 0.2s;
    }
    .reveal-btn.hidden-ans { background: #FDE8EF; color: #8C4A60; }
    .reveal-btn.shown-ans { background: #F0E8EB; color: #8C4A60; }
    .quiz-answer {
      margin-top: 10px; padding: 10px 13px;
      background: #F5FFF5; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      line-height: 1.6; color: #2A5A2A;
      border: 1px solid #C8E8C8;
      animation: fadeIn 0.25s ease-out;
    }

    /* ── MCQ ── */
    .mcq-opt {
      border: 2px solid #F0D0DA; border-radius: 10px;
      padding: 10px 14px; cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      background: white; display: block; width: 100%;
      text-align: left; margin-bottom: 6px; line-height: 1.4;
    }
    .mcq-opt:hover { border-color: #D4849B; background: #FFF0F4; }
    .mcq-opt.selected { border-color: #C06080; background: #FDE8EF; }
    .mcq-opt.correct { border-color: #6BAF7B; background: #E8F5EC; }
    .mcq-opt.wrong { border-color: #D46B6B; background: #FDECEC; }
    .mcq-explain {
      margin-top: 10px; padding: 9px 13px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; line-height: 1.5;
    }

    /* ── Checklist ── */
    .checklist-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 0;
      font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5;
      cursor: pointer;
    }
    .checklist-item input[type="checkbox"] {
      margin-top: 2px;
      accent-color: #C06080;
      width: 17px; height: 17px;
      flex-shrink: 0;
    }
    .checklist-label { transition: all 0.2s; }
    .checklist-label.done { text-decoration: line-through; color: #B0A0A6; }
    .checklist-divider { border: none; border-top: 1px solid #F5DDE3; margin: 0; }
    .checklist-progress {
      text-align: center; margin-top: 16px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; color: #8C5A6A;
    }

    /* ── Section heading ── */
    .lecture-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .lecture-icon { font-size: 32px; }
    .lecture-lbl {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; color: #C06080;
    }
    .lecture-title { font-size: clamp(18px, 3.5vw, 26px); font-weight: 700; color: #4A1A2E; line-height: 1.2; }
    .lecture-divider {
      height: 2px;
      background: linear-gradient(90deg, #E8A8BE, transparent);
      border-radius: 1px; margin-bottom: 22px;
    }
    .page-title {
      font-size: 22px; font-weight: 700; color: #4A1A2E; margin-bottom: 5px;
    }
    .page-sub { font-family: 'DM Sans', sans-serif; font-size: 13px; color: #8C5A6A; margin-bottom: 22px; }

    /* ── Footer ── */
    footer {
      text-align: center; padding: 20px 16px;
      border-top: 1px solid #F0D0DA;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; color: #B0758A;
      margin-top: 40px;
    }

    /* ── Animations ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease-out; }

    /* ── Mobile / iPad responsive ── */
    @media (max-width: 900px) {
      #hamburger { display: block; }
      #sidebar {
        position: fixed;
        top: 0; left: 0;
        width: min(280px, 85vw);
        height: 100vh; height: 100dvh;
        transform: translateX(-100%);
        box-shadow: 4px 0 24px rgba(60,20,40,0.18);
        padding-top: 60px;
      }
      #sidebar.open { transform: translateX(0); }
      #sidebar-overlay.open { display: block; }
      #main-content { padding: 18px 14px; max-width: 100%; }
      #layout { flex-direction: column; }
      .header-inner { gap: 10px; }
      .progress-bar { width: 80px; }
    }
    @media (max-width: 480px) {
      .header-title { font-size: 15px; }
      .lecture-title { font-size: 17px; }
      .expand-btn { padding: 12px 14px; }
      .sec-title { font-size: 14px; }
      .quiz-toggle-btn { font-size: 13px; padding: 11px 16px; }
      .progress-box { display: none; }
    }
    /* iPad landscape: keep sidebar visible */
    @media (min-width: 901px) {
      #sidebar { display: block !important; transform: translateX(0) !important; }
      #main-content { max-width: calc(100% - 260px); }
    }
  </style>
</head>

let state = {
  page: 'lecture',        // 'lecture' | 'mcq' | 'checklist'
  activeLecture: 0,
  expandedSections: {},   // key: "lectureIdx-sectionIdx" → bool

// ══════════════════════════════════════════════
//  SIDEBAR TOGGLE
// ══════════════════════════════════════════════
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('open');
}
function closeSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  sb.classList.remove('open');
  ov.classList.remove('open');
}

// ══════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════
function showPage(page, lectureIdx) {
  closeSidebar();
  if (page === 'lecture') {
    state.page = 'lecture';
    state.activeLecture = lectureIdx;
  } else {
    state.page = page;
  }
  updateNavHighlight();
  renderMain();
}

function updateNavHighlight() {
  // lectures
  LECTURES.forEach((_, i) => {
    const btn = document.getElementById('nav-lec-' + i);
    if (btn) btn.classList.toggle('active', state.page === 'lecture' && state.activeLecture === i);
  });
  const mcqBtn = document.getElementById('nav-mcq');
  const clBtn = document.getElementById('nav-checklist');
  if (mcqBtn) mcqBtn.classList.toggle('active', state.page === 'mcq');
  if (clBtn) clBtn.classList.toggle('active', state.page === 'checklist');
}

// ══════════════════════════════════════════════
//  PROGRESS
// ══════════════════════════════════════════════
function updateProgress() {
  let total = 0, done = 0;
  LECTURES.forEach((l, li) => {
    l.sections.forEach((_, si) => {
      total++;
      if (state.expandedSections[li + '-' + si]) done++;
    });
  });
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
}

// ══════════════════════════════════════════════
//  SECTION TOGGLE
// ══════════════════════════════════════════════
function toggleSection(key) {
  state.expandedSections[key] = !state.expandedSections[key];
  updateProgress();
  // Re-render just the section button and body
  const btn = document.getElementById('sec-btn-' + key);
  const body = document.getElementById('sec-body-' + key);
  const num = document.getElementById('sec-num-' + key);
  const arrow = document.getElementById('sec-arrow-' + key);
  if (!btn) return;
  const open = state.expandedSections[key];
  num.className = 'sec-num ' + (open ? 'open' : 'closed');
  arrow.style.transform = open ? 'rotate(180deg)' : 'rotate(0deg)';
  if (open) {
    body.style.display = 'block';
  } else {
    body.style.display = 'none';
  }
}

// ══════════════════════════════════════════════
//  QUIZ TOGGLE
// ══════════════════════════════════════════════
function toggleQuiz(li) {
  state.quizVisible[li] = !state.quizVisible[li];
  const container = document.getElementById('quiz-container-' + li);
  const btn = document.getElementById('quiz-btn-' + li);
  if (container) {
    container.style.display = state.quizVisible[li] ? 'block' : 'none';
  }
  if (btn) {
    btn.textContent = (state.quizVisible[li] ? '🧠 Hide' : '🧠 Show') + ' Active Recall — Lecture ' + LECTURES[li].id;
  }
}

function toggleAnswer(key) {
  state.revealedAnswers[key] = !state.revealedAnswers[key];
  const ansDiv = document.getElementById('ans-' + key);
  const revBtn = document.getElementById('rev-btn-' + key);
  if (ansDiv) ansDiv.style.display = state.revealedAnswers[key] ? 'block' : 'none';
  if (revBtn) {
    revBtn.textContent = state.revealedAnswers[key] ? 'Hide Answer' : 'Reveal Answer';
    revBtn.className = 'reveal-btn ' + (state.revealedAnswers[key] ? 'shown-ans' : 'hidden-ans');
  }
}

// ══════════════════════════════════════════════
//  MCQ
// ══════════════════════════════════════════════
function selectMCQ(qi, optIdx) {
  if (state.mcqRevealed[qi]) return;
  state.mcqAnswers[qi] = optIdx;
  state.mcqRevealed[qi] = true;
  // Update options styling
  const mcq = MCQs[qi];
  mcq.opts.forEach((_, j) => {
    const btn = document.getElementById('mcq-opt-' + qi + '-' + j);
    if (!btn) return;
    btn.className = 'mcq-opt';
    if (j === mcq.ans) btn.classList.add('correct');
    else if (j === optIdx) btn.classList.add('wrong');
  });
  // Show explanation
  const expl = document.getElementById('mcq-explain-' + qi);
  if (expl) {
    expl.style.display = 'block';
    expl.style.background = optIdx === mcq.ans ? '#E8F5EC' : '#FDECEC';
    expl.textContent = (optIdx === mcq.ans ? '✅ Correct! ' : '❌ Incorrect. ') + mcq.explain;
  }
}

// ══════════════════════════════════════════════
//  CHECKLIST
// ══════════════════════════════════════════════
function toggleCheck(i) {
  state.checkedItems[i] = !state.checkedItems[i];
  const lbl = document.getElementById('cl-lbl-' + i);
  if (lbl) lbl.className = 'checklist-label' + (state.checkedItems[i] ? ' done' : '');
  const inp = document.getElementById('cl-inp-' + i);
  if (inp) inp.checked = !!state.checkedItems[i];
  const prog = document.getElementById('cl-prog');
  if (prog) {
    const done = Object.values(state.checkedItems).filter(Boolean).length;
    prog.textContent = done + ' / ' + CHECKLIST.length + ' mastered';
  }
}

function e(tag, attrs, ...children) {
  // Tiny HTML builder helper
  const attrStr = Object.entries(attrs || {}).map(([k, v]) => {
    if (v === null || v === undefined) return '';
    return ` ${k}="${String(v).replace(/"/g, '&quot;')}"`;
  }).join('');
  const inner = children.map(c => c == null ? '' : String(c)).join('');
  const voids = ['input', 'br', 'hr', 'img'];
  if (voids.includes(tag)) return `<${tag}${attrStr}>`;
  return `<${tag}${attrStr}>${inner}</${tag}>`;
}

function renderSectionContent(sec, li, si) {
  const key = li + '-' + si;
  const open = !!state.expandedSections[key];
  // Always render full content — just hide/show with display
  let body = `<div class="section-body" id="sec-body-${key}" style="display:${open ? 'block' : 'none'};">`;
  body += `<div class="simple-block"><span class="tag" style="background:#FDDFE8;color:#A04A65;">Simple Explanation</span><p class="block-text">${sec.simple}</p></div>`;
  body += `<div class="academic-block"><span class="tag" style="background:#F0C8D8;color:#7A3050;">Academic Detail</span><p class="academic-text">${sec.academic}</p></div>`;
  if (sec.keyTerms && sec.keyTerms.length) {
    body += `<div style="margin-bottom:14px;"><span class="tag" style="background:#E8D4F0;color:#6A3080;">Key Terms</span><div class="terms-grid" style="margin-top:8px;">`;
    sec.keyTerms.forEach(kt => {
      body += `<div class="term-card"><span class="term-name">${kt.term}:</span> ${kt.def}</div>`;
    });
    body += `</div></div>`;
  }
  if (sec.examPoints && sec.examPoints.length) {
    body += `<div class="exam-block"><span class="tag" style="background:#F8E8C8;color:#8A6020;">🎯 High-Yield Exam Points</span>`;
    sec.examPoints.forEach(ep => {
      body += `<div class="exam-point"><span class="exam-bullet">▸</span><span>${ep}</span></div>`;
    });
    body += `</div>`;
  }
  if (sec.confusion) {
    body += `<div class="confusion-block"><span class="tag" style="background:#F8D0D0;color:#904040;">⚠️ Common Confusion</span><p class="confusion-text">${sec.confusion}</p></div>`;
  }
  body += `</div>`;

  return `
    <div class="card" style="margin-bottom:14px;overflow:hidden;">
      <button class="expand-btn" id="sec-btn-${key}" onclick="toggleSection('${key}')">
        <div class="expand-btn-left">
          <span class="sec-num ${open ? 'open' : 'closed'}" id="sec-num-${key}">${si + 1}</span>
          <span class="sec-title">${sec.title}</span>
        </div>
        <span class="expand-arrow" id="sec-arrow-${key}" style="transform:${open ? 'rotate(180deg)' : 'rotate(0deg)'}">▾</span>
      </button>
      ${body}
    </div>`;
}

function renderLecturePage() {
  const li = state.activeLecture;
  const lecture = LECTURES[li];
  let html = `<div class="fade-in">`;

  // Header
  html += `
    <div class="lecture-header">
      <span class="lecture-icon">${lecture.icon}</span>
      <div>
        <div class="lecture-lbl">Lecture ${lecture.id}</div>
        <div class="lecture-title">${lecture.title}</div>
      </div>
    </div>
    <div class="lecture-divider"></div>`;

  // Sections
  lecture.sections.forEach((sec, si) => {
    html += renderSectionContent(sec, li, si);
  });

  // Quiz
  const quizOpen = !!state.quizVisible[li];
  html += `
    <div style="margin-top:28px;">
      <button class="quiz-toggle-btn" id="quiz-btn-${li}" onclick="toggleQuiz(${li})">
        ${quizOpen ? '🧠 Hide' : '🧠 Show'} Active Recall — Lecture ${lecture.id}
      </button>
      <div id="quiz-container-${li}" class="fade-in" style="margin-top:16px;display:${quizOpen ? 'block' : 'none'};">`;

  lecture.quiz.forEach((qa, qi) => {
    const rKey = li + '-' + qi;
    const revealed = !!state.revealedAnswers[rKey];
    html += `
      <div class="card quiz-item" style="margin-bottom:10px;">
        <p class="quiz-q">Q${qi + 1}: ${qa.q}</p>
        <button class="reveal-btn ${revealed ? 'shown-ans' : 'hidden-ans'}" id="rev-btn-${rKey}" onclick="toggleAnswer('${rKey}')">
          ${revealed ? 'Hide Answer' : 'Reveal Answer'}
        </button>
        <div class="quiz-answer" id="ans-${rKey}" style="display:${revealed ? 'block' : 'none'};">${qa.a}</div>
      </div>`;
  });

  html += `</div></div></div>`;
  return html;
}

function renderMCQPage() {
  let html = `<div class="fade-in">
    <div class="page-title">📝 Multiple Choice Question Bank</div>
    <div class="page-sub">Test your knowledge across all 5 lectures. Select an answer to check.</div>`;

  MCQs.forEach((mcq, qi) => {
    const revealed = !!state.mcqRevealed[qi];
    html += `
      <div class="card" style="padding:18px;margin-bottom:14px;">
        <div style="font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;color:#C06080;margin-bottom:7px;letter-spacing:1px;">QUESTION ${qi + 1}</div>
        <p style="font-size:15px;font-weight:600;margin-bottom:12px;line-height:1.5;color:#4A1A2E;">${mcq.q}</p>`;

    mcq.opts.forEach((opt, j) => {
      let cls = 'mcq-opt';
      if (revealed) {
        if (j === mcq.ans) cls += ' correct';
        else if (state.mcqAnswers[qi] === j) cls += ' wrong';
      } else if (state.mcqAnswers[qi] === j) cls += ' selected';
      html += `<button id="mcq-opt-${qi}-${j}" class="${cls}" onclick="selectMCQ(${qi},${j})">
        <span style="font-weight:600;margin-right:6px;">${String.fromCharCode(65 + j)}.</span>${opt}
      </button>`;
    });

    const answer = state.mcqAnswers[qi];
    const correct = answer === mcq.ans;
    html += `
      <div class="mcq-explain" id="mcq-explain-${qi}" 
        style="display:${revealed ? 'block' : 'none'};background:${correct ? '#E8F5EC' : '#FDECEC'};">
        ${revealed ? ((correct ? '✅ Correct! ' : '❌ Incorrect. ') + mcq.explain) : ''}
      </div>
    </div>`;
  });

  html += `</div>`;
  return html;
}

function renderChecklistPage() {
  const done = Object.values(state.checkedItems).filter(Boolean).length;
  let html = `<div class="fade-in">
    <div class="page-title">✅ Full Marks Checklist</div>
    <div class="page-sub">Can you confidently explain each of these? Check off as you master them.</div>
    <div class="card" style="padding:18px;">`;

  CHECKLIST.forEach((item, i) => {
    const checked = !!state.checkedItems[i];
    html += `
      <div>
        <label class="checklist-item" onclick="toggleCheck(${i})">
          <input type="checkbox" id="cl-inp-${i}" ${checked ? 'checked' : ''} onclick="event.stopPropagation();toggleCheck(${i})">
          <span id="cl-lbl-${i}" class="checklist-label${checked ? ' done' : ''}">${item}</span>
        </label>
        ${i < CHECKLIST.length - 1 ? '<hr class="checklist-divider">' : ''}
      </div>`;
  });

  html += `<div class="checklist-progress" id="cl-prog">${done} / ${CHECKLIST.length} mastered</div>`;
  html += `</div></div>`;
  return html;
}

function renderMain() {
  const main = document.getElementById('main-content');
  if (state.page === 'lecture') {
    main.innerHTML = renderLecturePage();
  } else if (state.page === 'mcq') {
    main.innerHTML = renderMCQPage();
  } else if (state.page === 'checklist') {
    main.innerHTML = renderChecklistPage();
  }
  main.scrollTop = 0;
  window.scrollTo(0, 0);
}

// ══════════════════════════════════════════════
//  BUILD SIDEBAR NAV
// ══════════════════════════════════════════════
function buildSidebarNav() {
  const nav = document.getElementById('lecture-nav');
  nav.innerHTML = LECTURES.map((l, i) =>
    `<button id="nav-lec-${i}" class="nav-item${i === 0 ? ' active' : ''}" onclick="showPage('lecture', ${i})">
      <span class="nav-icon">${l.icon}</span>
      <span>${l.title}</span>
    </button>`
  ).join('');
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
buildSidebarNav();
renderMain();
updateProgress();
</script>
</body>
